# ======================
# Site + Theme
# ======================
remote_theme: "mmistakes/minimal-mistakes@4.27.3"
theme: null # avoid conflicts with remote_theme
plugins:
    - jekyll-include-cache # required by Minimal Mistakes

# ======================
# Meta
# ======================
title: "Quintin de Kok"
subtitle: "Enterprise Architect — Cloud, DevOps, Hybrid" # MM uses `subtitle`; your old `tagline` is fine to remove
description: "Designing reliable, cost-controlled cloud & hybrid platforms for high-scale iGaming"
url: "https://quintindk.co.za"
baseurl: "" # keep blank since you publish at the root
locale: "en"
repository: "quintindk/quintindk.github.io"

# ======================
# Appearance
# ======================
minimal_mistakes_skin: "dark" # you’ll still override colors via SCSS
logo: "/assets/images/logo.png"

# ======================
# Author
# ======================
author:
    name: "Quintin de Kok"
    bio: "Trusted expert, hands-on, optimizing for clarity, reliability & cost control."
    links:
        - label: "Email"
          icon: "fas fa-envelope"
          url: "mailto:quintindk@gmail.com"
        - label: "LinkedIn"
          icon: "fab fa-linkedin"
          url: "https://linkedin.com/in/quintindk"
        - label: "GitHub"
          icon: "fab fa-github"
          url: "https://github.com/quintindk"

# ======================
# Defaults
# ======================
defaults:
    - scope:
          path: ""
          type: pages
      values:
          layout: single
    - scope:
          path: ""
          type: posts
      values:
          layout: post
          comments: false
          share: true

# ======================
# Optional
# ======================
paginate: 5
paginate_path: "/page:num/"

markdown: kramdown
